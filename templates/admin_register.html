<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KikkyHairs · Register Admin</title>
  <style>
    /* ----- GLOBAL LUXURY VARIABLES ----- */
    :root {
      --gold: #b38728;
      --deep-brown: #2c2420;
      --bg-soft: #1e1814;
      --white-off: #f4f4f4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to bottom, #0c0c0c, #111111);
      color: var(--white-off);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .register-container {
      background: var(--bg-soft);
      border: 1px solid rgba(179,135,40,0.3);
      border-radius: 28px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #aaa;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      border-bottom: 1px dashed #333;
      padding-bottom: 1rem;
    }
    .flash-message {
      background: rgba(179,135,40,0.15);
      border-left: 4px solid var(--gold);
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 25px;
      color: #fff;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-weight: 500;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 15px 18px;
      background: #2a241f;
      border: 1px solid #3a3a3a;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      transition: 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(179,135,40,0.2);
    }
    button {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      border: none;
      border-radius: 50px;
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }
    button:hover {
      background: #d4a259;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(179,135,40,0.3);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2>➕ New Admin</h2>
    <div class="sub">create an additional administrator</div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-message">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="admin@kikky.ng">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" name="confirm_password" required placeholder="••••••••">
      </div>
      <button type="submit">Register admin</button>
    </form>

    <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to dashboard</a>
  </div>
</body>
</html>
