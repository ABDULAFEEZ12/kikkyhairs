<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kikky Hairs · Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

<style>

:root{
--gold:#b38728;
--gold-gradient:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);
--bg-soft:#1e1814;
--white-off:#f4f4f4;
--font-heading:'Playfair Display',serif;
--font-body:'Montserrat',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:var(--font-body);
background:linear-gradient(to bottom,#0c0c0c,#111);
color:var(--white-off);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
}

.checkout-container{
max-width:1000px;
width:100%;
background:var(--bg-soft);
border:1px solid rgba(179,135,40,0.3);
border-radius:32px;
padding:32px;
transition:all 0.2s ease;
}

h1{
font-family:var(--font-heading);
font-size:2.2rem;
margin-bottom:5px;
}

h1 span{color:var(--gold);}

.subtitle{
color:#aaa;
margin-bottom:25px;
border-bottom:1px dashed #333;
padding-bottom:15px;
font-size:0.9rem;
}

.checkout-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.section-title{
display:flex;
align-items:center;
gap:10px;
font-family:var(--font-heading);
font-size:1.4rem;
color:var(--gold);
margin-bottom:20px;
}

.form-group{margin-bottom:22px;}

label{
display:block;
margin-bottom:8px;
color:#ccc;
font-size:0.9rem;
font-weight:500;
}

input,textarea{
width:100%;
padding:14px 18px;
background:#2a241f;
border:1px solid #3a3a3a;
border-radius:60px;
color:#fff;
font-family:var(--font-body);
font-size:1rem;
transition:border 0.2s, box-shadow 0.2s;
}

input:focus, textarea:focus{
outline:none;
border-color:var(--gold);
box-shadow:0 0 0 2px rgba(179,135,40,0.3);
}

textarea{
border-radius:24px;
resize:vertical;
min-height:90px;
}

.cart-summary{
background:#2a241f;
border-radius:28px;
padding:24px;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #3a3a3a;
font-size:0.95rem;
}

.cart-total{
display:flex;
justify-content:space-between;
margin-top:18px;
font-weight:700;
font-size:1.1rem;
}

.total-amount{color:var(--gold);font-size:1.4rem;}

.btn-pay{
width:100%;
padding:18px;
background:var(--gold-gradient);
border:none;
border-radius:60px;
font-weight:700;
font-size:1rem;
margin-top:28px;
cursor:pointer;
transition:transform 0.2s, opacity 0.2s;
color:#000;
letter-spacing:0.5px;
}

.btn-pay:active{transform:scale(0.98);}

.bank-box{
margin-top:28px;
padding:24px;
border-radius:28px;
background:#2a241f;
border:1px dashed var(--gold);
display:none;
backdrop-filter:blur(4px);
}

.bank-box h3{
color:var(--gold);
font-family:var(--font-heading);
margin-bottom:16px;
font-size:1.2rem;
}

.bank-box p{
margin:8px 0;
font-size:0.9rem;
line-height:1.5;
word-break:break-word;
}

.bank-box strong{color:#ddd;}

.whatsapp-btn{
display:block;
text-align:center;
margin-top:20px;
padding:14px;
border-radius:60px;
background:#25D366;
color:#fff;
font-weight:700;
text-decoration:none;
transition:background 0.2s, transform 0.1s;
font-size:1rem;
}

.whatsapp-btn:active{transform:scale(0.97);}
.whatsapp-btn:hover{background:#20b859;}

/* ========== MOBILE IMPROVEMENTS ========== */
@media (max-width: 768px) {
  body{padding:12px;}
  .checkout-container{
    padding:24px;
    border-radius:28px;
  }
  h1{font-size:1.8rem;}
  .subtitle{font-size:0.8rem; margin-bottom:20px;}
  .checkout-grid{gap:30px;}
  .section-title{font-size:1.25rem; margin-bottom:16px;}
  .form-group{margin-bottom:18px;}
  input,textarea{padding:14px 16px; font-size:0.95rem;}
  .cart-summary{padding:20px;}
  .cart-item{padding:10px 0; font-size:0.9rem;}
  .cart-total{font-size:1rem;}
  .total-amount{font-size:1.3rem;}
  .btn-pay{padding:16px; font-size:0.95rem; margin-top:24px;}
  .bank-box{padding:20px; margin-top:24px;}
  .whatsapp-btn{padding:14px;}
}

@media (max-width: 480px) {
  body{padding:10px;}
  .checkout-container{
    padding:18px;
    border-radius:24px;
  }
  h1{font-size:1.6rem;}
  .subtitle{margin-bottom:18px; padding-bottom:12px;}
  .section-title{font-size:1.15rem; gap:8px;}
  .form-group{margin-bottom:16px;}
  label{font-size:0.8rem; margin-bottom:5px;}
  input,textarea{
    padding:12px 14px;
    border-radius:50px;
    font-size:0.9rem;
  }
  textarea{border-radius:20px;}
  .cart-summary{padding:16px;}
  .cart-item{padding:10px 0; font-size:0.85rem; flex-wrap:wrap; gap:6px;}
  .cart-total{margin-top:14px;}
  .total-amount{font-size:1.2rem;}
  .btn-pay{
    padding:14px;
    font-size:0.9rem;
    border-radius:50px;
    margin-top:20px;
  }
  .bank-box{
    padding:16px;
    margin-top:20px;
    border-radius:24px;
  }
  .bank-box h3{font-size:1.1rem; margin-bottom:12px;}
  .bank-box p{font-size:0.8rem; margin:6px 0;}
  .whatsapp-btn{
    padding:12px;
    font-size:0.9rem;
    margin-top:16px;
  }
}

/* extra small devices */
@media (max-width: 360px) {
  .checkout-container{padding:14px;}
  h1{font-size:1.4rem;}
  .section-title{font-size:1rem;}
  .cart-item{flex-direction:column; align-items:flex-start; gap:4px;}
}
</style>
</head>

<body>

<div class="checkout-container">

<h1>complete <span>checkout</span></h1>
<div class="subtitle">secure payment via bank transfer</div>

<div class="checkout-grid">

<div>

<div class="section-title">
<i class="ri-user-line"></i>
<span>your details</span>
</div>

<div class="form-group">
<label>Full name *</label>
<input id="fullName" required>
</div>

<div class="form-group">
<label>Email *</label>
<input id="email" required>
</div>

<div class="form-group">
<label>Phone *</label>
<input id="phone" required>
</div>

<div class="form-group">
<label>Delivery address *</label>
<textarea id="address" rows="3" required></textarea>
</div>

</div>

<div>

<div class="section-title">
<i class="ri-shopping-bag-line"></i>
<span>your cart</span>
</div>

<div class="cart-summary" id="cartSummary"></div>

<button class="btn-pay" id="placeOrder">place order</button>

<div class="bank-box" id="bankBox">

<h3>Complete payment</h3>

<p>Send payment to:</p>

<p><strong>Bank:</strong> Opay</p>
<p><strong>Account Name:</strong> Tella Azeezat Olamide</p>
<p><strong>Account Number:</strong> 8147014346</p>

<p style="margin-top:10px;font-size:0.9rem;color:#aaa;">
After payment send screenshot on WhatsApp to confirm your order.
</p>

<a id="whatsappLink" class="whatsapp-btn" target="_blank">
Confirm Payment on WhatsApp
</a>

</div>

</div>

</div>

</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("kikkyCart")) || [];
}

function renderCart(){

const cart=getCart();
const summary=document.getElementById("cartSummary");

let html="";
let total=0;

cart.forEach(item=>{
const subtotal=item.price*(item.quantity||1);
total+=subtotal;

html+=`
<div class="cart-item">
<span>${item.name} (x${item.quantity||1})</span>
<span>₦${subtotal.toLocaleString()}</span>
</div>
`;
});

html+=`
<div class="cart-total">
<span>Total</span>
<span class="total-amount">₦${total.toLocaleString()}</span>
</div>
`;

summary.innerHTML=html;

return total;

}

const total=renderCart();

document.getElementById("placeOrder").onclick=function(){

const name=document.getElementById("fullName").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Please fill all required fields");
return;
}

const reference="KIKKY_"+Math.floor(Math.random()*100000000);

document.getElementById("bankBox").style.display="block";

let itemsList="";
const cart=getCart();

cart.forEach(item=>{
itemsList += `${item.name} (x${item.quantity || 1})%0A`;
});

const message=`Hello Kikky Hairs,%0AI just placed an order.%0A%0AOrder Ref: ${reference}%0A%0AItems:%0A${itemsList}%0AAmount: ₦${total}%0A%0ACustomer Details:%0AName: ${name}%0APhone: ${phone}%0ADelivery Address: ${address}%0A%0AI have sent payment.`;

document.getElementById("whatsappLink").href=
"https://wa.me/2348147014346?text="+message;

}

</script>

</body>
</html>
