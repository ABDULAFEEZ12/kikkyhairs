<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kikky Hairs · Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

<style>

:root{
--gold:#b38728;
--gold-gradient:linear-gradient(135deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);
--bg-soft:#1e1814;
--white-off:#f4f4f4;
--font-heading:'Playfair Display',serif;
--font-body:'Montserrat',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:var(--font-body);
background:linear-gradient(to bottom,#0c0c0c,#111);
color:var(--white-off);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.checkout-container{
max-width:1000px;
width:100%;
background:var(--bg-soft);
border:1px solid rgba(179,135,40,0.3);
border-radius:32px;
padding:40px;
}

h1{
font-family:var(--font-heading);
font-size:2.2rem;
margin-bottom:5px;
}

h1 span{color:var(--gold);}

.subtitle{
color:#aaa;
margin-bottom:25px;
border-bottom:1px dashed #333;
padding-bottom:15px;
}

.checkout-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

@media(max-width:768px){
.checkout-grid{grid-template-columns:1fr;}
}

.section-title{
display:flex;
align-items:center;
gap:10px;
font-family:var(--font-heading);
font-size:1.4rem;
color:var(--gold);
margin-bottom:20px;
}

.form-group{margin-bottom:18px;}

label{
display:block;
margin-bottom:6px;
color:#ccc;
font-size:0.9rem;
}

input,textarea{
width:100%;
padding:14px 18px;
background:#2a241f;
border:1px solid #3a3a3a;
border-radius:50px;
color:#fff;
}

textarea{
border-radius:20px;
resize:vertical;
}

.cart-summary{
background:#2a241f;
border-radius:28px;
padding:25px;
}

.cart-item{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #3a3a3a;
}

.cart-total{
display:flex;
justify-content:space-between;
margin-top:15px;
font-weight:700;
}

.total-amount{color:var(--gold);font-size:1.3rem;}

.btn-pay{
width:100%;
padding:18px;
background:var(--gold-gradient);
border:none;
border-radius:50px;
font-weight:700;
margin-top:25px;
cursor:pointer;
}

.bank-box{
margin-top:25px;
padding:20px;
border-radius:20px;
background:#2a241f;
border:1px dashed var(--gold);
display:none;
}

.whatsapp-btn{
display:block;
text-align:center;
margin-top:15px;
padding:14px;
border-radius:50px;
background:#25D366;
color:#fff;
font-weight:700;
text-decoration:none;
}

</style>
</head>

<body>

<div class="checkout-container">

<h1>complete <span>checkout</span></h1>
<div class="subtitle">secure payment via bank transfer</div>

<div class="checkout-grid">

<div>

<div class="section-title">
<i class="ri-user-line"></i>
<span>your details</span>
</div>

<div class="form-group">
<label>Full name *</label>
<input id="fullName" required>
</div>

<div class="form-group">
<label>Email *</label>
<input id="email" required>
</div>

<div class="form-group">
<label>Phone *</label>
<input id="phone" required>
</div>

<div class="form-group">
<label>Delivery address *</label>
<textarea id="address" rows="3" required></textarea>
</div>

</div>

<div>

<div class="section-title">
<i class="ri-shopping-bag-line"></i>
<span>your cart</span>
</div>

<div class="cart-summary" id="cartSummary"></div>

<button class="btn-pay" id="placeOrder">place order</button>

<div class="bank-box" id="bankBox">

<h3>Complete payment</h3>

<p>Send payment to:</p>

<p><strong>Bank:</strong> Union Bank</p>
<p><strong>Account Name:</strong> Tella Azeezat Olamide</p>
<p><strong>Account Number:</strong> 0126705352</p>

<p style="margin-top:10px;font-size:0.9rem;color:#aaa;">
After payment send screenshot on WhatsApp to confirm your order.
</p>

<a id="whatsappLink" class="whatsapp-btn" target="_blank">
Confirm Payment on WhatsApp
</a>

</div>

</div>

</div>

</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("kikkyCart")) || [];
}

function renderCart(){

const cart=getCart();
const summary=document.getElementById("cartSummary");

let html="";
let total=0;

cart.forEach(item=>{
const subtotal=item.price*(item.quantity||1);
total+=subtotal;

html+=`
<div class="cart-item">
<span>${item.name} (x${item.quantity||1})</span>
<span>₦${subtotal.toLocaleString()}</span>
</div>
`;
});

html+=`
<div class="cart-total">
<span>Total</span>
<span class="total-amount">₦${total.toLocaleString()}</span>
</div>
`;

summary.innerHTML=html;

return total;

}

const total=renderCart();

document.getElementById("placeOrder").onclick=function(){

const name=document.getElementById("fullName").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(!name||!phone||!address){
alert("Please fill all required fields");
return;
}

const reference="KIKKY_"+Math.floor(Math.random()*100000000);

document.getElementById("bankBox").style.display="block";

let itemsList="";
const cart=getCart();

cart.forEach(item=>{
itemsList += `${item.name} (x${item.quantity || 1})%0A`;
});

const message=`Hello Kikky Hairs,%0AI just placed an order.%0A%0AOrder Ref: ${reference}%0A%0AItems:%0A${itemsList}%0AAmount: ₦${total}%0A%0ACustomer Details:%0AName: ${name}%0APhone: ${phone}%0ADelivery Address: ${address}%0A%0AI have sent payment.`;

document.getElementById("whatsappLink").href=
"https://wa.me/2348147014346?text="+message;

}

</script>

</body>
</html>
